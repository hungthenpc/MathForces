<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathForces — Bài tập</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .problem-container {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 32px;
    animation: fadeUp 0.3s ease;
  }

  .problem-header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .problem-id {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .problem-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    margin-bottom: 16px;
  }
  .problem-meta {
    display: flex;
    align-items: center;
    gap: 14px;
    flex-wrap: wrap;
  }

  .contest-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: var(--accent2);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border: 1px solid var(--accent2);
    border-radius: 4px;
    transition: all 0.15s;
    margin-top: 12px;
    letter-spacing: 0.3px;
  }
  .contest-link:hover {
    background: rgba(78, 140, 255, 0.1);
    color: #6ba0ff;
  }

  .problem-content {
    font-family: 'Crimson Pro', serif;
    font-size: 17px;
    line-height: 1.8;
    color: var(--text);
  }
  .problem-content h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    margin: 28px 0 12px;
    letter-spacing: 0.3px;
  }
  .problem-content p {
    margin-bottom: 14px;
  }
  .problem-content ul, .problem-content ol {
    margin: 10px 0 18px 24px;
  }
  .problem-content li {
    margin-bottom: 6px;
    font-size: 16px;
  }

  /* Ảnh hình học - xử lý nền trắng */
  .problem-content img,
  .solution-content img {
    max-width: 100%;
    border-radius: 8px;
    margin: 20px 0;
    background: transparent;
    mix-blend-mode: multiply;
  }

  @media (prefers-color-scheme: dark) {
    .problem-content img,
    .solution-content img {
      mix-blend-mode: screen;
      filter: brightness(0.9) contrast(1.1);
    }
  }

  .tag-list {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .tag-item {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 3px;
    background: var(--tag-bg);
    border: 1px solid var(--border);
    color: var(--text-dim);
    text-transform: lowercase;
    letter-spacing: 0.3px;
  }

  /* Solution section */
  .solution-section {
    margin-top: 36px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .solution-btn {
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 12px 24px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .solution-btn:hover { background: #f7d060; }

  .solution-content {
    display: none;
    margin-top: 24px;
    background: var(--surface);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 24px 28px;
    animation: fadeUp 0.25s ease;
    font-size: 16px;
    line-height: 1.8;
  }
  .solution-content.show {
    display: block;
  }
  .solution-content h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 14px;
    letter-spacing: 0.3px;
  }

  /* Phần ghi nguồn lời giải */
  .solution-source {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 20px;
    padding-bottom: 12px;
    border-bottom: 1px dashed var(--border-light);
    font-style: italic;
  }

  .not-found {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }
  .not-found h2 {
    font-size: 20px;
    color: var(--text-dim);
    margin-bottom: 10px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* MathJax font size */
  .problem-content mjx-container,
  .solution-content mjx-container {
    font-size: 17px !important;
  }
  .problem-meta-left {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
.sub-ratings {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
</style>
<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <div class="logo-icon">∑</div>
    Math<span>Forces</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Trang chủ</a>
    <a class="nav-link active" href="problemset.html">Danh sách bài</a>
    <a class="nav-link" href="contests.html">Kì thi</a>
  </div>
</nav>

<div class="problem-container" id="problemContainer"></div>

<script src="problems.js"></script>
<script src="contests.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const problemId = params.get('id');

  const problem = PROBLEMS.find(p => p.id === problemId);
  const contest = problem ? CONTESTS.find(c => c.id === problem.contestId) : null;

  const container = document.getElementById('problemContainer');

  if (!problem) {
    container.innerHTML = `
      <div class="not-found">
        <h2>Không tìm thấy bài tập</h2>
        <p>Không có bài tập nào với ID "${problemId || '?'}".</p>
      </div>
    `;
  } else {
    document.title = `${problem.title} — MathForces`;

    const ratingClass = (r) =>
      r < 1200 ? 'rating-easy' :
      r < 2000 ? 'rating-medium' :
      r < 2700 ? 'rating-hard' : 'rating-expert';

    const solutionSourceHtml = problem.solutionSource && problem.solutionSource.trim() !== '' 
      ? `<div class="solution-source">Nguồn: ${problem.solutionSource}</div>` 
      : '';

    container.innerHTML = `
      <div class="problem-header">
        <div class="problem-title">${problem.title}</div>
        <div class="problem-meta">
         <div class="problem-meta-left">
  <span class="card-rating ${ratingClass(problem.rating)}" style="font-size:14px;padding:4px 12px;">${problem.rating}</span>
  ${problem.subRatings ? `
    <div class="sub-ratings">
      ${problem.subRatings.map(sr => `
        <span class="card-rating ${ratingClass(sr.value)}" style="font-size:12px;padding:3px 10px;">Ý ${sr.label}: ${sr.value}</span>
      `).join('')}
    </div>
  ` : ''}
</div>
        </div>
        <div class="tag-list">
          ${problem.tags.map(t => `<span class="tag-item">${t}</span>`).join('')}
        </div>
        ${contest ? `
        <a class="contest-link" href="contest-problems.html?id=${contest.id}">
           ${contest.title} (${contest.division})
        </a>
        ` : ''}
      </div>

      <div class="problem-content">
        ${problem.content}
      </div>

      ${problem.solution ? `
      <div class="solution-section">
        <button class="solution-btn" id="solutionBtn" onclick="toggleSolution()">Lời giải</button>
        <div class="solution-content" id="solutionContent">
          <h3>Lời giải</h3>
          ${solutionSourceHtml}
          ${problem.solution}
        </div>
      </div>
      ` : ''}
    `;
  }

  window.toggleSolution = function() {
    const content = document.getElementById('solutionContent');
    const btn = document.getElementById('solutionBtn');
    if (content) {
      content.classList.toggle('show');
      btn.textContent = content.classList.contains('show') ? 'Ẩn lời giải' : 'Lời giải';
      if (content.classList.contains('show') && window.MathJax) {
        MathJax.typesetPromise([content]).catch(err => console.error('MathJax error:', err));
      }
    }
  };

  if (window.MathJax) {
    MathJax.typesetPromise([container]).catch(err => console.error('MathJax error:', err));
  }
</script>
</body>
</html>
