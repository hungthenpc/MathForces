<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathForces — Contest</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
<style>
  .cp-container {
    max-width: 900px;
    margin: 0 auto;
    padding: 48px 36px;
  }

  .cp-header {
    margin-bottom: 36px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .cp-title {
    font-size: 26px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    margin-bottom: 12px;
  }
  .cp-meta {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }
  .cp-meta-item {
    font-size: 14px;
    color: var(--text-dim);
  }
  .cp-meta-item span {
    color: var(--text);
    font-weight: 600;
  }
  .cp-division {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 4px 12px;
    border-radius: 4px;
    background: rgba(240,192,64,0.15);
    color: var(--accent);
    text-transform: uppercase;
    display: inline-block;
  }
  .cp-desc {
    font-size: 16px;
    color: var(--text-dim);
    line-height: 1.7;
    font-family: 'Crimson Pro', serif;
    margin-top: 12px;
  }

  /* Problem section */
  .cp-problem-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 28px 30px;
    margin-bottom: 20px;
    transition: border-color 0.15s;
    cursor: pointer;
  }
  .cp-problem-section:hover {
    border-color: var(--accent2);
  }
  .cp-problem-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--border);
  }
  .cp-problem-letter {
    font-size: 16px;
    font-weight: 700;
    color: var(--accent);
    min-width: 28px;
  }
  .cp-problem-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
    flex: 1;
  }
  .cp-problem-body {
    font-family: 'Crimson Pro', serif;
    font-size: 16px;
    line-height: 1.8;
    color: var(--text);
  }
  .cp-problem-body h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    margin: 20px 0 10px;
    letter-spacing: 0.3px;
  }
  .cp-problem-body p {
    margin-bottom: 12px;
  }
  .cp-problem-body ul, .cp-problem-body ol {
    margin: 8px 0 16px 20px;
  }
  .cp-problem-body li {
    margin-bottom: 4px;
  }

  .cp-solution-section {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .cp-solution-btn {
    background: var(--accent);
    border: none;
    color: #000;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 18px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .cp-solution-btn:hover { background: #f7d060; }

  .cp-solution-content {
    display: none;
    margin-top: 16px;
    background: var(--surface2);
    border: 1px solid var(--border-light);
    border-radius: 8px;
    padding: 20px 24px;
    font-size: 15px;
    line-height: 1.7;
  }
  .cp-solution-content.show {
    display: block;
  }
  .cp-solution-content h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 10px;
  }

  .not-found {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 16px;
  }

  @media (max-width: 640px) {
    .cp-container { padding: 24px 16px; }
    .cp-problem-section { padding: 20px; }
  }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <div class="logo-icon">∑</div>
    Math<span>Forces</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link" href="problemset.html">Problemset</a>
    <a class="nav-link active" href="contests.html">Contests</a>
   
  </div>
 
</nav>

<div class="cp-container" id="cpContainer"></div>

<script src="problems.js"></script>
<script src="contests.js"></script>
<script>
  const params = new URLSearchParams(window.location.search);
  const contestId = params.get('id');
  const contest = CONTESTS.find(c => c.id === contestId);

  const container = document.getElementById('cpContainer');

  const ratingClass = (r) =>
    r < 1200 ? 'rating-easy' :
    r < 2000 ? 'rating-medium' :
    r < 2700 ? 'rating-hard' : 'rating-expert';

  if (!contest) {
    container.innerHTML = `
      <div class="not-found">
        <p>Contest not found.</p>
        <a class="back-link" href="contests.html" style="margin-top:16px;">← Back to Contests</a>
      </div>
    `;
  } else {
    document.title = `${contest.title} — MathForces`;

    const contestProblems = contest.problems
      .map(id => PROBLEMS.find(p => p.id === id))
      .filter(p => p);

    const formatDate = (dateStr) => {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    };

    container.innerHTML = `
      <div class="cp-header">
        <div class="cp-title">${contest.title}</div>
        <div class="cp-meta">
          <span class="cp-meta-item">Date: <span>${formatDate(contest.date)}</span></span>
          <span class="cp-meta-item">Duration: <span>${contest.duration}</span></span>
          <span class="cp-meta-item">Problems: <span>${contestProblems.length}</span></span>
        </div>
        <span class="cp-division">${contest.division}</span>
        
      </div>

      ${contestProblems.map((p, i) => `
        <div class="cp-problem-section" id="problem-${p.id}" onclick="window.location.href='problem.html?id=${p.id}'">
          <div class="cp-problem-header">
            <span class="cp-problem-letter">P${i + 1}.</span>
            <span class="cp-problem-title">${p.title}</span>
            <span class="card-rating ${ratingClass(p.rating)}" style="font-size:12px;padding:3px 10px;">${p.rating}</span>
            <span style="font-size:11px;color:var(--text-dim);">${p.tags.join(', ')}</span>
          </div>
          <div class="cp-problem-body">${p.content}</div>
          ${p.solution ? `
          <div class="cp-solution-section" onclick="event.stopPropagation();">
            <button class="cp-solution-btn" onclick="toggleCpSolution('sol-${p.id}', this)">Solution</button>
            <div class="cp-solution-content" id="sol-${p.id}">
              <h3>Solution</h3>
              ${p.solution}
            </div>
          </div>
          ` : ''}
        </div>
      `).join('')}
    `;
  }

  // Global toggle function for solution buttons inside contest page
  window.toggleCpSolution = function(solId, btn) {
    const content = document.getElementById(solId);
    if (content) {
      content.classList.toggle('show');
      btn.textContent = content.classList.contains('show') ? 'Hide Solution' : 'Solution';
      if (content.classList.contains('show') && window.MathJax) {
        MathJax.typesetPromise([content]).catch(err => console.error('MathJax error:', err));
      }
    }
  };

  if (window.MathJax) {
    MathJax.typesetPromise([container]).catch(err => console.error('MathJax error:', err));
  }
</script>
</body>
</html>
