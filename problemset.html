<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathForces — Problem Set</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <div class="logo-icon">∑</div>
    Math<span>Forces</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Home</a>
    <a class="nav-link active" href="problemset.html">Problemset</a>
    <a class="nav-link" href="contests.html">Contests</a>
    
  </div>
  
</nav>

<div class="page">

  <aside class="sidebar">
    <div class="filter-section">
      <div class="filter-label">Rating Range</div>
      <div class="range-row">
        <input class="range-input" id="ratingMin" type="number" placeholder="800" min="800" max="3500" value="800">
        <span class="range-sep">–</span>
        <input class="range-input" id="ratingMax" type="number" placeholder="3500" min="800" max="3500" value="3500">
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Tags</div>
      <div class="tags-grid-wrapper">
        <div class="tags-grid" id="tagsGrid">
          <button class="tag-toggle" data-tag="algebra">algebra</button>
          <button class="tag-toggle" data-tag="combinatorics">combinatorics</button>
          <button class="tag-toggle" data-tag="number theory">number theory</button>
          <button class="tag-toggle" data-tag="geometry">geometry</button>
          <button class="tag-toggle" data-tag="probability">probability</button>
          <button class="tag-toggle" data-tag="calculus">calculus</button>
          <button class="tag-toggle" data-tag="inequalities">inequalities</button>
          <button class="tag-toggle" data-tag="sequences">sequences</button>
          <button class="tag-toggle" data-tag="graph theory">graph theory</button>
          <button class="tag-toggle" data-tag="logic">logic</button>
          <button class="tag-toggle" data-tag="set theory">set theory</button>
          <button class="tag-toggle" data-tag="matrices">matrices</button>
        </div>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Sort By</div>
      <select class="sort-select" id="sortSelect">
        <option value="newest">Newest First</option>
        <option value="oldest">Oldest First</option>
        <option value="rating-asc">Rating (Low → High)</option>
        <option value="rating-desc">Rating (High → Low)</option>
      </select>
    </div>

    <button class="apply-btn" id="applyBtn">Apply Filters</button>
  </aside>

  <main class="main">
    <div class="main-header">
      <div class="main-title">Problem Set</div>
      <div class="main-count" id="countLabel">9 problems</div>
    </div>

    <div class="search-row">
      <input class="search-input" id="searchInput" type="text" placeholder="Search problems by name…">
      <button class="search-btn" id="searchBtn">Search</button>
    </div>

    <div class="active-filters" id="activeFilters"></div>

    <div class="problem-grid" id="problemGrid"></div>

    <div class="pagination" id="pagination"></div>
  </main>
</div>

<script src="problems.js"></script>
<script src="script.js"></script>
</body>
</html>
