<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathForces — Danh sách bài</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<script>
  MathJax = {
    tex: {
      inlineMath: [['$', '$'], ['\\(', '\\)']],
      displayMath: [['$$', '$$'], ['\\[', '\\]']],
      processEscapes: true
    },
    options: {
      skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
    }
  };
</script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>
<body>

<nav>
  <a class="logo" href="index.html">
    <div class="logo-icon">∑</div>
    Math<span>Forces</span>
  </a>
  <div class="nav-links">
    <a class="nav-link" href="index.html">Trang chủ</a>
    <a class="nav-link active" href="problemset.html">Danh sách bài</a>
    <a class="nav-link" href="contests.html">Kì thi</a>
    
  </div>
  
</nav>

<div class="page">

  <aside class="sidebar">
    <div class="filter-section">
      <div class="filter-label">Độ khó</div>
      <div class="range-row">
        <input class="range-input" id="ratingMin" type="number" placeholder="800" min="800" max="3500" value="800">
        <span class="range-sep">–</span>
        <input class="range-input" id="ratingMax" type="number" placeholder="3500" min="800" max="3500" value="3500">
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Chủ đề</div>
      <div class="tags-grid-wrapper">
        <div class="tags-grid" id="tagsGrid">
          <button class="tag-toggle" data-tag="Số học">Số học</button>
          <button class="tag-toggle" data-tag="Tổ hợp">Tổ hợp</button>
          <button class="tag-toggle" data-tag="Hình học">Hình học</button>
          <button class="tag-toggle" data-tag="Đại số">Đại số</button>
          <button class="tag-toggle" data-tag="Bất đẳng thức">Bất đẳng thức</button>
          <button class="tag-toggle" data-tag="Dãy số">Dãy số</button>
          <button class="tag-toggle" data-tag="Đa thức">Đa thức</button>
          <button class="tag-toggle" data-tag="Đồ thị">Đồ thị</button>
          <button class="tag-toggle" data-tag="Giải tích">Giải tích</button>
          <button class="tag-toggle" data-tag="Phương trình hàm">Phương trình hàm</button>
          <button class="tag-toggle" data-tag="Đếm">Đếm</button>
          <button class="tag-toggle" data-tag="Giới hạn">Giới hạn</button>
        </div>
      </div>
    </div>

    <div class="filter-section">
      <div class="filter-label">Sắp xếp theo</div>
      <select class="sort-select" id="sortSelect">
        <option value="newest">Mới nhất</option>
        <option value="oldest">Cũ nhất</option>
        <option value="rating-asc">Dễ nhất</option>
        <option value="rating-desc">Khó nhất</option>
      </select>
    </div>

    <button class="apply-btn" id="applyBtn">Tìm kiếm</button>
  </aside>

  <main class="main">
    <div class="main-header">
      <div class="main-title">Danh sách bài</div>
      <div class="main-count" id="countLabel">9 bài</div>
    </div>

    <div class="search-row">
      <input class="search-input" id="searchInput" type="text" placeholder="Tìm kiếm tên bài...">
      <button class="search-btn" id="searchBtn">Tìm kiếm</button>
    </div>

    <div class="active-filters" id="activeFilters"></div>

    <div class="problem-grid" id="problemGrid"></div>

    <div class="pagination" id="pagination"></div>
  </main>
</div>

<script src="problems.js"></script>
<script src="script.js"></script>
</body>
</html>
